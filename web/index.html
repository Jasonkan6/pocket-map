<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pocket Map</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; height: 100dvh; display: flex; flex-direction: column; }

    /* 篩選列 */
    #filter-bar {
      display: flex; gap: 8px; padding: 10px 12px;
      overflow-x: auto; background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      z-index: 10; flex-shrink: 0;
    }
    #filter-bar::-webkit-scrollbar { display: none; }
    .chip {
      white-space: nowrap; padding: 6px 14px;
      border-radius: 20px; border: 1.5px solid #ddd;
      background: #fff; font-size: 13px; cursor: pointer;
      transition: all 0.2s;
    }
    .chip.active { background: #1a73e8; color: #fff; border-color: #1a73e8; }

    /* 地圖 */
    #map { flex: 1; width: 100%; }

    /* Bottom Sheet */
    #sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-radius: 20px 20px 0 0;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
      padding: 16px 20px 32px;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      z-index: 100;
      max-height: 80vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    #sheet.open { transform: translateY(0); }
    .sheet-handle {
      width: 40px; height: 4px; background: #ddd;
      border-radius: 2px; margin: 0 auto 16px;
    }
    #sheet-category {
      font-size: 12px; color: #888; margin-bottom: 4px;
    }
    #sheet-name {
      font-size: 20px; font-weight: 700; margin-bottom: 6px;
    }
    #sheet-region {
      font-size: 13px; color: #555; margin-bottom: 8px;
    }
    #sheet-address {
      font-size: 13px; color: #555; margin-bottom: 8px;
    }
    #sheet-note {
      font-size: 14px; color: #333; margin-bottom: 16px;
      line-height: 1.5;
    }
    #sheet-image {
      width: 100%; height: auto;
      border-radius: 12px;
      margin-bottom: 16px; display: none;
    }


    #sheet-link {
      display: block; text-align: center;
      background: #1a73e8; color: #fff;
      padding: 12px; border-radius: 12px;
      text-decoration: none; font-size: 15px; font-weight: 600;
    }
    #sheet-maps-link {
      display: none;
      position: absolute; top: 12px; right: 52px;
      background: #1a9e8f; color: #fff;
      width: 34px; height: 34px; border-radius: 8px;
      text-decoration: none;
      align-items: center; justify-content: center;
    }
    #sheet-close {
      position: absolute; top: 14px; right: 16px;
      font-size: 22px; color: #aaa; cursor: pointer;
      background: none; border: none;
    }
    #parking-btn {
      display: none; width: 100%; margin-bottom: 12px;
      padding: 12px; background: #f5f5f5; border: 1.5px solid #ddd;
      border-radius: 12px; font-size: 15px; font-weight: 600;
      cursor: pointer; color: #333;
    }
    #parking-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    #parking-view { display: none; }
    #parking-back {
      background: none; border: none; font-size: 14px;
      color: #1a73e8; cursor: pointer; padding: 0 0 12px 0; font-weight: 600;
    }
    #parking-title { font-size: 13px; color: #888; margin-bottom: 12px; }
    #parking-list { display: flex; flex-direction: column; gap: 8px; }
    .parking-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; background: #f9f9f9; border-radius: 12px;
      text-decoration: none; color: inherit; border: 1.5px solid #eee;
    }
    .parking-item:active { background: #eee; }
    .parking-item-info { flex: 1; }
    .parking-item-name { font-size: 14px; font-weight: 600; color: #222; }
    .parking-item-meta { font-size: 12px; color: #888; margin-top: 3px; }
    .parking-item-arrow { font-size: 18px; color: #ccc; margin-left: 8px; }
    .parking-status-open { color: #2e7d32; font-weight: 600; }
    .parking-status-closed { color: #c62828; font-weight: 600; }
    #parking-empty {
      display: none; font-size: 14px; color: #999;
      text-align: center; padding: 20px 0;
    }
        /* 定位按鈕 */
    #locate-btn {
      position: fixed; bottom: 32px; right: 16px;
      width: 48px; height: 48px; border-radius: 50%;
      background: #fff; border: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      font-size: 22px; cursor: pointer; z-index: 50;
    }

    /* 載入中 */
    #loading {

    /* 載入中 */
    #loading {
      position: fixed; inset: 0; background: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: #555; z-index: 200;
    }
  </style>
</head>
<body>

<div id="loading">載入中...</div>

<div id="filter-bar">
  <div class="chip active" data-filter="all">全部</div>
  <div class="chip" data-filter="food">🍜 美食</div>
  <div class="chip" data-filter="cafe">☕ 咖啡廳</div>
  <div class="chip" data-filter="attraction">🏛 景點</div>
  <div class="chip" data-filter="accommodation">🏨 住宿</div>
  <div class="chip" data-filter="other">📌 其他</div>
</div>

<div id="map"></div>
<button id="locate-btn">📍</button>


<div id="sheet">
  <div class="sheet-handle"></div>
  <button id="sheet-close">×</button>
  <div id="sheet-category"></div>
  <div id="sheet-name"></div>
  <div id="sheet-region"></div>
  <div id="sheet-address"></div>
  <div id="sheet-note"></div>
  <button id="parking-btn">🅿️ 找附近停車場</button>
  <img id="sheet-image" alt="" />
  <a id="sheet-link" href="#" target="_blank">查看原始貼文</a>
  <a id="sheet-maps-link" href="#" target="_blank" rel="noopener noreferrer" title="在 Google Maps 開啟">
    <svg viewBox="0 0 24 24" fill="white" width="20" height="20"><path d="M12 2 3 21l.75-.34L12 17.5l8.25 3.16.75.34Z"/></svg>
  </a>

  <div id="parking-view">
    <button id="parking-back">← 返回地點資訊</button>
    <div id="parking-title"></div>
    <div id="parking-empty">附近沒有找到停車場</div>
    <div id="parking-list"></div>
  </div>
</div>

<script>
  const SUPABASE_URL="https://xkfsmmqzsghmaxeyupdm.supabase.co";
const SUPABASE_KEY= "sb_publishable_HVRTd3c8wUYY6wCM6kf_Ig_mdPPChOt";
const LIFF_ID = "2010187867-q8Uu2ynr";
const MAPS_KEY ="AIzaSyDoDHi2r7dEmA-RwENOAe2otYhHp4uPVD4";

  const categoryLabel = {
    food: '🍜 美食', cafe: '☕ 咖啡廳',
    attraction: '🏛 景點', accommodation: '🏨 住宿', other: '📌 其他'
  };
  const regionLabel = {
    north: '北部', central: '中部', south: '南部', east: '東部', unknown: '不明'
  };

  let map, allPlaces = [], markers = [];
  let activeFilter = 'all';
  let currentPlace = null;

  // 初始化
  async function init() {
    await liff.init({ liffId: LIFF_ID });
    const places = await fetchPlaces();
    allPlaces = places;
    loadGoogleMaps();
  }

  // 撈 Supabase 資料
  async function fetchPlaces() {
    const res = await fetch(
      SUPABASE_URL + '/rest/v1/places?select=*&order=created_at.desc',
      { headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY } }
    );
    return res.json();
  }

  function showDebug(msg) {
    let el = document.getElementById('debug-overlay');
    if (!el) {
      el = document.createElement('div');
      el.id = 'debug-overlay';
      el.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#c00;color:#fff;font-size:12px;padding:8px;z-index:9999;word-break:break-all;white-space:pre-wrap;max-height:40vh;overflow-y:auto';
      document.body.appendChild(el);
    }
    el.textContent += msg + '\n';
  }

  window.onerror = (msg, src, line) => showDebug('JS ERROR: ' + msg + ' @ ' + src + ':' + line);
  window.gm_authFailure = () => showDebug('Maps auth failed — API key rejected for this domain: ' + location.hostname);

  // 載入 Google Maps
  function loadGoogleMaps() {
    showDebug('Loading Maps from: ' + location.hostname);
    const script = document.createElement('script');
    script.src = 'https://maps.googleapis.com/maps/api/js?key=' + MAPS_KEY + '&callback=onMapReady';
    script.async = true;
    script.onerror = () => showDebug('Maps script failed to load');
    document.head.appendChild(script);
  }

  // 地圖準備好
  window.onMapReady = function () {
    map = new google.maps.Map(document.getElementById('map'), {
      center: { lat: 23.97, lng: 120.97 }, // 台灣中心
      zoom: 8,
      disableDefaultUI: true,
      zoomControl: true,
    });
    renderMarkers(allPlaces);
    document.getElementById('loading').style.display = 'none';
    setupFilters();
    setupLocate();
    document.getElementById('parking-btn').addEventListener('click', findParking);
    document.getElementById('parking-back').addEventListener('click', () => {
      if (currentPlace) openSheet(currentPlace);
    });


  };

  // 渲染地標
  function renderMarkers(places) {
    markers.forEach(m => m.setMap(null));
    markers = [];

    places.forEach(place => {
      if (!place.lat || !place.lng) return;
      const marker = new google.maps.Marker({
        position: { lat: place.lat, lng: place.lng },
        map,
        title: place.name,
      });
      marker.addListener('click', () => openSheet(place));
      markers.push(marker);
    });
  }

  // 篩選
  function setupFilters() {
    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        activeFilter = chip.dataset.filter;
        const filtered = activeFilter === 'all'
          ? allPlaces
          : allPlaces.filter(p => p.category === activeFilter);
        renderMarkers(filtered);
      });
    });
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function hideParkingView() {
    document.getElementById('parking-view').style.display = 'none';
    document.getElementById('parking-list').innerHTML = '';
    document.getElementById('parking-empty').style.display = 'none';
  }

  function showParkingView(results, placeName) {
    // Hide default sheet content
    ['sheet-category','sheet-name','sheet-region','sheet-address','sheet-note',
     'sheet-image','sheet-link','parking-btn'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.display = 'none';
    });
    document.getElementById('sheet-maps-link').style.display = 'none';

    const view = document.getElementById('parking-view');
    view.style.display = 'block';

    document.getElementById('parking-title').textContent = '🅿️ 「' + placeName + '」附近停車場';
    document.getElementById('parking-empty').style.display = results.length === 0 ? 'block' : 'none';

    const list = document.getElementById('parking-list');
    list.innerHTML = results.map(p => {
      const dist = p.distance >= 1000
        ? (p.distance / 1000).toFixed(1) + 'km'
        : p.distance + 'm';
      const statusHtml = p.open_now === true
        ? '<span class="parking-status-open">● 營業中</span>'
        : p.open_now === false
          ? '<span class="parking-status-closed">● 已打烊</span>'
          : '';
      const href = 'https://www.google.com/maps/place/?q=place_id:' + encodeURIComponent(p.place_id);
      return '<a class="parking-item" href="' + href + '" target="_blank" rel="noopener noreferrer">'
        + '<div class="parking-item-info">'
        + '<div class="parking-item-name">' + escapeHtml(p.name) + '</div>'
        + '<div class="parking-item-meta">' + dist + (statusHtml ? ' · ' + statusHtml : '') + '</div>'
        + '</div>'
        + '<div class="parking-item-arrow">›</div>'
        + '</a>';
    }).join('');
  }

  async function findParking() {
    if (!currentPlace?.lat || !currentPlace?.lng) return;
    const btn = document.getElementById('parking-btn');
    btn.disabled = true;
    btn.textContent = '⏳ 搜尋中...';
    try {
      const res = await fetch('/api/parking?lat=' + currentPlace.lat + '&lng=' + currentPlace.lng + '&radius=600');
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'API error');
      showParkingView(data.results, currentPlace.name);
    } catch (err) {
      console.error('findParking error:', err);
      btn.disabled = false;
      btn.textContent = '🅿️ 找附近停車場';
      alert('搜尋停車場失敗，請稍後再試。');
    }
  }

  // 開啟 Bottom Sheet
  function openSheet(place) {
    hideParkingView();
    currentPlace = place;
    document.getElementById('sheet-category').textContent = categoryLabel[place.category] || place.category;
    document.getElementById('sheet-name').textContent = place.name;
    document.getElementById('sheet-region').textContent = '📍 ' + (regionLabel[place.region] || place.region);
    document.getElementById('sheet-address').textContent = place.address || '';
    document.getElementById('sheet-note').textContent = place.note || '';
    const img = document.getElementById('sheet-image');
    if (place.image_url) {
      img.src = place.image_url;
      img.style.display = 'block';
    } else {
      img.style.display = 'none';
    }
    const link = document.getElementById('sheet-link');
    if (place.source_url) {
      link.href = place.source_url;
      link.style.display = 'block';
    } else {
      link.style.display = 'none';
    }
    const mapsLink = document.getElementById('sheet-maps-link');
    const mapsQuery = [place.name, place.address].filter(Boolean).join(' ');
    if (mapsQuery) {
      mapsLink.href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(mapsQuery)}`;
      mapsLink.style.display = 'flex';
    } else if (place.lat && place.lng) {
      mapsLink.href = `https://www.google.com/maps/search/?api=1&query=${place.lat},${place.lng}`;
      mapsLink.style.display = 'flex';
    } else {
      mapsLink.style.display = 'none';
    }
    const parkingBtn = document.getElementById('parking-btn');
    parkingBtn.style.display = (place.lat && place.lng) ? 'block' : 'none';
    parkingBtn.disabled = false;
    parkingBtn.textContent = '🅿️ 找附近停車場';

    document.getElementById('sheet').classList.add('open');
  }

  document.getElementById('sheet-close').addEventListener('click', () => {
    document.getElementById('sheet').classList.remove('open');
    hideParkingView();
    currentPlace = null;
  });
    // 定位功能
  function setupLocate() {
    document.getElementById('locate-btn').addEventListener('click', locateMe);
    locateMe();  // 開啟時自動定位
  }

  function locateMe() {
    if (!navigator.geolocation) return;
    const btn = document.getElementById('locate-btn');
    btn.textContent = '⏳';
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const me = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        map.setCenter(me);
        map.setZoom(14);
        btn.textContent = '📍';
        if (window.myDot) window.myDot.setMap(null);
        window.myDot = new google.maps.Marker({
          position: me, map,
          icon: {
            path: google.maps.SymbolPath.CIRCLE,
            scale: 8, fillColor: '#4285F4', fillOpacity: 1,
            strokeColor: '#fff', strokeWeight: 2,
          },
          title: '你在這裡', zIndex: 999,
        });
      },
      () => {
        btn.textContent = '📍';
        alert('無法取得位置，請確認已允許定位權限。');
      }
    );
  }

  init().catch(console.error);
</script>

<!-- Google Maps 由 loadGoogleMaps() 動態載入 -->
</body>
</html>
